<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Viewer Test</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        model-viewer::part(default-ar-button) {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) scale(6);
            transform-origin: center;
        }
        .error-message {
            color: red;
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="qrcode" style="position: absolute; top: 15px; right: 15px; z-index: 10;"></div>

    <model-viewer
        id="ar-viewer"
        alt="Mein 3D Modell"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        touch-action="pan-y"
        style="width: 100vw; height: 80vh; margin: 0; display: block;">
    </model-viewer>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const modelUrl = window.location.search.substring(1);
    const viewer = document.getElementById('ar-viewer');

    if (!viewer) return;

    if (modelUrl && modelUrl.trim() !== "") {
        
        if (modelUrl.includes("loca.lt")) {
            const cleanUrl = modelUrl.split('?')[0];
            const baseUrl = new URL(cleanUrl).origin;

            // TRICK: Wir prüfen, ob wir gerade frisch von dem Localtunnel-Bypass kommen
            if (!window.location.hash.includes("bypassed")) {
                // Wenn nicht, schicken wir den User DIREKT auf das Localtunnel-Hauptverzeichnis.
                // Er landet dort auf der Infoseite, klickt einmal (oder es schaltet direkt frei)
                // Wir hängen als "Referrer" oder Ziel unsere jetzige Seite wieder hinten dran.
                
                console.log("Zwinge Localtunnel-Handshake...");
                
                // Wir speichern, wo wir hinwollten, und leiten das gesamte Handy auf Localtunnel um
                const returnUrl = window.location.href + "#bypassed";
                
                // Da der direkte Klick nötig ist, zeigen wir dem User ein super schnelles, 
                // sauberes Overlay, falls Localtunnel hakt:
                viewer.style.display = "none";
                const loadingDiv = document.createElement('div');
                loadingDiv.className = "error-message";
                loadingDiv.style.color = "#333";
                loadingDiv.innerHTML = "Verbindung zum 3D-Server wird hergestellt...<br><br>" +
                    "<a href='" + baseUrl + "' style='padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;'>Hier tippen zum Freischalten</a>";
                document.body.appendChild(loadingDiv);
                
                // Versuche die automatische Weiterleitung zum Freischalten
                setTimeout(() => {
                    window.location.href = baseUrl;
                }, 1000);
                
                return;
            }

            // Wenn wir hier landen, hat das Handy die loca.lt-Domain physisch besucht und das Cookie!
            viewer.setAttribute('crossorigin', 'anonymous');
            viewer.setAttribute('src', cleanUrl);

        } else {
            viewer.setAttribute('src', modelUrl);
        }

    } else {
        viewer.style.display = "none";
        const errorDiv = document.createElement('div');
        errorDiv.className = "error-message";
        errorDiv.innerText = "Fehler: Kein 3D-Modell in der URL angegeben!";
        document.body.appendChild(errorDiv);
    }

    const qrcodeContainer = document.getElementById("qrcode");
    if (qrcodeContainer) {
        new QRCode(qrcodeContainer, {
            text: window.location.href.split('#')[0], // QR-Code bleibt sauber ohne Hash
            width: 200,
            height: 200,
        });
    }
});
</script>
</body>
</html>
