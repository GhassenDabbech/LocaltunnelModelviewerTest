<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Viewer Test</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        model-viewer::part(default-ar-button) {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) scale(6);
            transform-origin: center;
        }
        .error-message {
            color: red;
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="qrcode" style="position: absolute; top: 15px; right: 15px; z-index: 10;"></div>

    <model-viewer
        id="ar-viewer"
        alt="Mein 3D Modell"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        touch-action="pan-y"
        style="width: 100vw; height: 80vh; margin: 0; display: block;">
    </model-viewer>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const modelUrl = window.location.search.substring(1);
    const viewer = document.getElementById('ar-viewer');

    if (!viewer) return;

    if (modelUrl && modelUrl.trim() !== "") {
        const cleanUrl = modelUrl.split('?')[0];
        const baseUrl = new URL(cleanUrl).origin;

        // Wenn die Seite normal geladen wird, prüfen wir die Verbindung
        if (modelUrl.includes("loca.lt")) {
            
            // Wenn der User aus dem Freischalt-Prozess kommt (erkenntbar am localStorage-Marker)
            if (localStorage.getItem("lt_bypassed") === "true") {
                // Marker direkt löschen für den nächsten Scan
                localStorage.removeItem("lt_bypassed");
                
                // Modell direkt laden, da der Tunnel jetzt offen ist!
                viewer.setAttribute('crossorigin', 'anonymous');
                viewer.setAttribute('src', cleanUrl);
            } else {
                // Erster Aufruf: Wir zeigen den Freischalt-Button
                viewer.style.display = "none";
                const authDiv = document.createElement('div');
                authDiv.className = "error-message";
                authDiv.style.color = "#333";
                authDiv.innerHTML = "Verbindung zum Workshop-Server wird hergestellt...<br><br>" +
                    "<button id='bypassBtn' style='padding: 15px 30px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer;'>Hier tippen zum Freischalten</button>";
                document.body.appendChild(authDiv);

                document.getElementById('bypassBtn').addEventListener('click', () => {
                    // Wir merken uns im Browser, dass wir gleich bereit sind
                    localStorage.setItem("lt_bypassed", "true");
                    
                    // Öffnet die Localtunnel-Seite (dein Bild 2) in einem neuen Tab/Fenster
                    const win = window.open(baseUrl, '_blank');
                    
                    // Zeigt dem User eine Info, dass er gleich zurückkehren kann
                    authDiv.innerHTML = "Bitte im geöffneten Fenster kurz bestätigen,<br>dann diese Seite aktualisieren!";
                    
                    // Nach 4 Sekunden laden wir diese Seite automatisch neu, damit das Modell erscheint
                    setTimeout(() => {
                        window.location.reload();
                    }, 4000);
                });
            }
        } else {
            viewer.setAttribute('src', modelUrl);
        }

    } else {
        viewer.style.display = "none";
        const errorDiv = document.createElement('div');
        errorDiv.className = "error-message";
        errorDiv.innerText = "Fehler: Kein 3D-Modell in der URL angegeben!";
        document.body.appendChild(errorDiv);
    }

    const qrcodeContainer = document.getElementById("qrcode");
    if (qrcodeContainer) {
        new QRCode(qrcodeContainer, {
            text: window.location.href.split('#')[0],
            width: 200,
            height: 200,
        });
    }
});
</script>
</body>
</html>
