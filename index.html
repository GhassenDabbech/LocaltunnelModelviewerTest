<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Viewer Test</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        model-viewer::part(default-ar-button) {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) scale(6);
            transform-origin: center;
        }
        .error-message {
            color: red;
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="qrcode" style="position: absolute; top: 15px; right: 15px; z-index: 10;"></div>

    <model-viewer
        id="ar-viewer"
        alt="Mein 3D Modell"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        touch-action="pan-y"
        style="width: 100vw; height: 80vh; margin: 0; display: block;">
    </model-viewer>

  <script>
document.addEventListener("DOMContentLoaded", () => {
    const modelUrl = window.location.search.substring(1);
    const viewer = document.getElementById('ar-viewer');

    if (!viewer) return;

    if (modelUrl && modelUrl.trim() !== "") {
        
        if (modelUrl.includes("loca.lt")) {
            // OPTION 2: Der unsichtbare Login im Hintergrund
            // Wir senden eine POST-Anfrage an die Localtunnel-Basisdomain,
            // um die IP-Sperre für diese Browser-Session sofort aufzuheben.
            
            const urlObj = new URL(modelUrl);
            const baseUrl = urlObj.origin; // Holt z.B. https://nice-worlds-kiss.loca.lt

            fetch(baseUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "bypass-tunnel-reminder": "true" // Sagt Localtunnel: Lass mich durch!
                },
                mode: "no-cors" // Verhindert die CORS-Blockade beim Login-Fetch
            })
            .then(() => {
                // Sobald die Anfrage raus ist, ist das Tor offen.
                // Jetzt laden wir das Modell ganz normal.
                viewer.setAttribute('src', modelUrl);
            })
            .catch(error => {
                console.error("Automatischer Bypass fehlgeschlagen:", error);
                viewer.setAttribute('src', modelUrl);
            });

        } else {
            // Für normale URLs direkt laden
            viewer.setAttribute('src', modelUrl);
        }

    } else {
        viewer.style.display = "none";
        const errorDiv = document.createElement('div');
        errorDiv.className = "error-message";
        errorDiv.innerText = "Fehler: Kein 3D-Modell in der URL angegeben!";
        document.body.appendChild(errorDiv);
    }

    // QR-Code generieren
    const qrcodeContainer = document.getElementById("qrcode");
    if (qrcodeContainer) {
        new QRCode(qrcodeContainer, {
            text: window.location.href,
            width: 200,
            height: 200,
        });
    }
});
</script>
</body>
</html>
