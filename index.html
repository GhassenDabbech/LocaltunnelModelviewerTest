<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Viewer Test</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        model-viewer::part(default-ar-button) {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) scale(6);
            transform-origin: center;
        }
        .error-message {
            color: red;
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="qrcode" style="position: absolute; top: 15px; right: 15px; z-index: 10;"></div>

    <model-viewer
        id="ar-viewer"
        alt="Mein 3D Modell"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        touch-action="pan-y"
        style="width: 100vw; height: 80vh; margin: 0; display: block;">
    </model-viewer>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const currentUrl = new URL(window.location.href);
    const modelUrl = currentUrl.search.substring(1).split('#')[0]; // Holt die reine .glb URL ohne Hash
    const viewer = document.getElementById('ar-viewer');

    if (!viewer) return;

    if (modelUrl && modelUrl.trim() !== "") {
        const cleanModelUrl = modelUrl.split('?')[0];
        const localtunnelBase = new URL(cleanModelUrl).origin;

        // SCHRITT 1: Wenn wir gerade frisch von Localtunnel zurückkommen, laden wir sofort das Modell!
        if (currentUrl.hash === "#back-from-tunnel") {
            console.log("Tunnel freigeschaltet! Lade Modell...");
            viewer.setAttribute('crossorigin', 'anonymous');
            viewer.setAttribute('src', cleanModelUrl);
        } 
        // SCHRITT 2: Wenn wir die Seite ganz frisch scannen, zwingen wir den sauberen Handshake
        else if (cleanModelUrl.includes("loca.lt")) {
            
            // Wir zeigen eine saubere Ladeseite statt des leeren Viewers
            viewer.style.display = "none";
            const authDiv = document.createElement('div');
            authDiv.className = "error-message";
            authDiv.style.color = "#333";
            authDiv.style.padding = "20px";
            authDiv.innerHTML = "<h3>AR-Sitzung wird vorbereitet...</h3>" +
                "<p style='font-size: 16px; color: #666;'>Klicke unten auf den Button, um die sichere Verbindung zum 3D-Server zu aktivieren.</p><br>" +
                "<button id='bypassBtn' style='padding: 15px 30px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; width: 80%; max-width: 300px;'>3D-Modell aktivieren</button>";
            document.body.appendChild(authDiv);

            document.getElementById('bypassBtn').addEventListener('click', () => {
                // Wir bauen die Rücksprung-URL: Unsere GitHub-Seite, aber mit dem Marker #back-from-tunnel
                const destinationWithHash = currentUrl.origin + currentUrl.pathname + currentUrl.search + "#back-from-tunnel";
                
                // Wir leiten das Handy DIREKT im selben Tab auf Localtunnel um
                window.location.href = localtunnelBase;
            });
        } else {
            // Für normale URLs direkt laden
            viewer.setAttribute('src', modelUrl);
        }

    } else {
        viewer.style.display = "none";
        const errorDiv = document.createElement('div');
        errorDiv.className = "error-message";
        errorDiv.innerText = "Fehler: Kein 3D-Modell in der URL angegeben!";
        document.body.appendChild(errorDiv);
    }

    // QR-Code generieren (Immer sauber ohne den Hash-Zusatz)
    const qrcodeContainer = document.getElementById("qrcode");
    if (qrcodeContainer) {
        new QRCode(qrcodeContainer, {
            text: currentUrl.origin + currentUrl.pathname + currentUrl.search,
            width: 200,
            height: 200,
        });
    }
});
</script>
</body>
</html>
